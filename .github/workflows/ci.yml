name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 跳过 postinstall（electron-rebuild），类型检查不需要原生模块
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript type check
        run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 测试层完全 mock 了 window.db，无需编译 better-sqlite3
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test
